<!DOCTYPE html>
<html>
  <body>
    <h1 id="text">Hello World</h1>
    <button onclick="changeText()">押して</button>

    <script>
      function changeText() {
        document.getElementById("text").innerHTML = "変わった！";
      }
    </script>
  </body>
</html>
<!DOCTYPE html>
<html>
  <body>
    <h1>メッセージアプリ</h1>

    <input id="inputText" type="text" placeholder="文字を入力">
    <button onclick="showText()">表示</button>

    <p id="output"></p>

    <script>
      function showText() {
        const text = document.getElementById("inputText").value;
        document.getElementById("output").innerHTML = text;
      }
    </script>
  </body>
</html>
